---
layout: default
title: Search Results
---

<div class="row">
  <div class="col-md-12">
    <br>
    <h2>Search Results</h2>
    <hr>
    <table class="table table-striped table-sm">
      <thead>
        <tr>
          <th scope="col">Title</th>
          <th scope="col">Category</th>
          <th scope="col">Link</th>
          <th scope="col">View Record</th>
        </tr>
      </thead>
      <tbody id="notesBody"></tbody>
    </table>
  </div>
</div>

<nav>
  <ul class="pagination justify-content-center" id="pagination"></ul>
</nav>

<script>
  function getSearchTerm() {
    const urlParams = new URLSearchParams(window.location.search);
    return urlParams.get('searchTerm') || '';
  }

  function filterNotes(term) {
    const lowerTerm = term.toLowerCase();
    return notes.filter(note => 
      (note.title && note.title.toLowerCase().includes(lowerTerm)) || 
      (note.category && note.category.toLowerCase().includes(lowerTerm)) || 
      (note.comment && note.comment.toLowerCase().includes(lowerTerm))
    );
  }

  const searchTerm = getSearchTerm();
  const searchResults = filterNotes(searchTerm);
  const notesPerPage = 12;
  let currentPage = 1;

  function renderResults(paginatedSubset) {
    return paginatedSubset.map(note => `
      <tr class="align-middle">
        <td>${escapeHTML(note.title)}</td>
        <td>${escapeHTML(note.category)}</td>
        <td>${note.link ? `<a href="${encodeURI(note.link)}" target="_blank" rel="noopener noreferrer" type="button" class="btn btn-primary btn-small"><i class="bi bi-link-45deg"></i></a>` : ''}</td>
        <td><a href="viewrecord.html?id=${encodeURIComponent(note.id)}" type="button" class="btn btn-primary btn-small"><i class="bi bi-eye"></i></a></td>
      </tr>
    `).join('');
  }

  function updateDisplay(page) {
    currentPage = page;
    paginate(searchResults, currentPage, notesPerPage, renderResults, 'notesBody');
    setupPaginationUI(searchResults.length, notesPerPage, currentPage, 'pagination', updateDisplay);
  }

  document.addEventListener('DOMContentLoaded', () => {
    updateDisplay(1);
  });
</script>
