---
layout: default
title: Keyboard Shortcuts
---

<div class="row">
  <div class="col-md-12">
    <br>
    <h2>Keyboard Shortcuts</h2>
    <hr>
    <table class="table table-hover table-sm">
      <thead>
        <tr>
          <th class="w-25" scope="col">Commands</th>
          <th class="w-75" scope="col">Function</th>
        </tr>
      </thead>
      <tbody id="notesBody"></tbody>
    </table>
  </div>
</div>

<nav>
  <ul class="pagination justify-content-center" id="pagination"></ul>
</nav>

<script>
  const category = "Keyboard shortcut";
  const shortcutResults = notes.filter(note => 
    note.category.toLowerCase().includes(category.toLowerCase())
  );

  const notesPerPage = 16;
  let currentPage = 1;

  function renderShortcuts(paginatedSubset) {
    return paginatedSubset.map(note => `
      <tr class="align-middle">
        <td class="text-primary">${escapeHTML(note.title)}</td>
        <td>${escapeHTML(note.comment)}</td>
      </tr>
    `).join('');
  }

  function updateDisplay(page) {
    currentPage = page;
    paginate(shortcutResults, currentPage, notesPerPage, renderShortcuts, 'notesBody');
    setupPaginationUI(shortcutResults.length, notesPerPage, currentPage, 'pagination', updateDisplay);
  }

  document.addEventListener('DOMContentLoaded', () => {
    updateDisplay(1);
  });
</script>
