<nav>
  <ul class="pagination justify-content-center" id="pagination"></ul>
</nav>

<script>
  // Filter for Tech News category and sort alphabetically
  const category = "Tech News";
  const newsResults = notes
    .filter(note => note.category.toLowerCase().includes(category.toLowerCase()))
    .sort((a, b) => a.title.localeCompare(b.title));

  const notesPerPage = 16;
  let currentPage = 1;

  function renderNews(paginatedSubset) {
    return paginatedSubset.map(note => `
      <tr class="align-middle">
        <td class="text-primary fs-5">
            <a href="${encodeURI(note.link)}" target="_blank" rel="noopener noreferrer">${escapeHTML(note.title)}</a>
        </td>
        <td>${escapeHTML(note.comment)}</td>
      </tr>
    `).join('');
  }

  function updateDisplay(page) {
    currentPage = page;
    paginate(newsResults, currentPage, notesPerPage, renderNews, 'notesBody');
    setupPaginationUI(newsResults.length, notesPerPage, currentPage, 'pagination', updateDisplay);
  }

  document.addEventListener('DOMContentLoaded', () => {
    updateDisplay(1);
  });
</script>
